# Panel seul — MariaDB externe (Minestrator)
# Usage : docker compose up -d --build

services:
  panel:
    build: .
    container_name: mc-admin-panel
    restart: unless-stopped
    ports:
      # 0.0.0.0 = accès direct (Hostinger, http://IP:8080). Mettez 127.0.0.1 si Nginx sur le VPS.
      - "${PANEL_BIND:-0.0.0.0}:${PANEL_PORT:-8080}:8080"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET}
      IP_HASH_SALT: ${IP_HASH_SALT}
      IP_ENCRYPTION_KEY: ${IP_ENCRYPTION_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
