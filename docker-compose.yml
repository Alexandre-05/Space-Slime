services:
  mariadb:
    image: mariadb:10.6
    container_name: mc-admin-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-rootpassword}
      MARIADB_DATABASE: ${DB_NAME:-minecraft_admin}
      MARIADB_USER: ${DB_USER:-admin}
      MARIADB_PASSWORD: ${DB_PASSWORD:-adminpassword}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  panel:
    build: .
    container_name: mc-admin-panel
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "${PANEL_PORT:-8080}:8080"
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-minecraft_admin}
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-adminpassword}
      JWT_SECRET: ${JWT_SECRET:-change-me-generate-a-long-random-secret}
      IP_HASH_SALT: ${IP_HASH_SALT:-change-me-in-production}
      IP_ENCRYPTION_KEY: ${IP_ENCRYPTION_KEY:-change-me-32-chars-minimum-key!!}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}

volumes:
  mariadb_data:
