spring:
  application:
    name: admin-api
  web:
    resources:
      add-mappings: false
  datasource:
    url: jdbc:mariadb://localhost:3306/minecraft_admin?useUnicode=true&characterEncoding=utf8&connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true
    username: admin
    password: adminpassword
    hikari:
      connection-init-sql: SET time_zone = '+00:00'
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        jdbc:
          time_zone: UTC
  jackson:
    time-zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: 8080

app:
  jwt:
    secret: change-me-to-a-long-random-secret-key-for-jwt-signing
    expiration-hours: 8
  ip:
    hash-salt: change-me-in-production
    encryption-key: change-me-32-chars-minimum-key!!
  cors:
    allowed-origins: http://localhost:5173
